name: Build Android Launcher APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk release/DigipalLauncher-v2-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk release/DigipalLauncher-v2-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: DigipalLauncher-v2-release
          path: release/DigipalLauncher-v2-release.apk
          retention-days: 90

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: DigipalLauncher-v2-debug
          path: release/DigipalLauncher-v2-debug.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: Digipal Launcher v2.0.${{ github.run_number }}
          files: |
            release/DigipalLauncher-v2-release.apk
            release/DigipalLauncher-v2-debug.apk
          make_latest: true
          body: |
            Digipal Launcher v2.0.${{ github.run_number }}
            
            Dedicated Android launcher with bundled GeckoView engine and native local media storage.
            
            Built from commit ${{ github.sha }}

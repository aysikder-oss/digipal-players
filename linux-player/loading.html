<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digipal Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container { text-align: center; }
    .logo { margin-bottom: 28px; }
    .logo img { width: 420px; height: auto; display: block; margin: 0 auto; }
    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 28px;
      letter-spacing: 0.2px;
    }
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #14B8A6;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50%       { opacity: 1;   transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="./icon.png" alt="Digipal" />
    </div>
    <p class="subtitle">Starting up…</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>

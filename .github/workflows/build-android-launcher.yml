name: Build Android Launcher APK

on:
  push:
    paths:
      - 'android-launcher/**'
    branches:
      - main
    tags:
      - 'android-launcher-v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-launcher
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - run: ./gradlew assembleDebug
      - run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk release/DigipalLauncher-v2-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk release/DigipalLauncher-v2-debug.apk
      - uses: actions/upload-artifact@v5
        with:
          name: DigipalLauncher-v2-release
          path: android-launcher/release/DigipalLauncher-v2-release.apk
          retention-days: 90
      - uses: actions/upload-artifact@v5
        with:
          name: DigipalLauncher-v2-debug
          path: android-launcher/release/DigipalLauncher-v2-debug.apk
          retention-days: 90

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/android-launcher-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.apk
          generate_release_notes: true
  

name: Build macOS Player

on:
  push:
    paths:
      - 'macos/**'
    branches:
      - main
    tags:
      - 'macos-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
      - name: Build app (Release)
        working-directory: macos/DigipalPlayer
        run: |
          xcodebuild -project DigipalPlayer.xcodeproj \
            -scheme DigipalPlayer \
            -configuration Release \
            -archivePath build/DigipalPlayer.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=YES
      - name: Export and sign app bundle
        working-directory: macos/DigipalPlayer
        run: |
          mkdir -p build/app
          cp -R "build/DigipalPlayer.xcarchive/Products/Applications/Digipal Player.app" build/app/
          codesign --force --deep --sign - --options runtime --entitlements DigipalPlayer/DigipalPlayer.entitlements "build/app/Digipal Player.app"
          codesign --verify --deep --strict "build/app/Digipal Player.app" && echo "Code signature valid" || echo "WARNING: Code signature invalid"
      - name: Create DMG
        working-directory: macos/DigipalPlayer
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Digipal Player" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Digipal Player.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "build/DigipalPlayer-1.0.0.dmg" \
            "build/app/" || true
          if [ ! -f "build/DigipalPlayer-1.0.0.dmg" ]; then
            hdiutil create -volname "Digipal Player" \
              -srcfolder "build/app" \
              -ov -format UDZO \
              "build/DigipalPlayer-1.0.0.dmg"
          fi
          ls -lh build/DigipalPlayer-1.0.0.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: digipal-macos-player-dmg
          path: macos/DigipalPlayer/build/DigipalPlayer-1.0.0.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: digipal-macos-player-app
          path: macos/DigipalPlayer/build/app/

  release:
    if: startsWith(github.ref, 'refs/tags/macos-v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


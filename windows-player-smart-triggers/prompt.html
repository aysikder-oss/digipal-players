<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digipal Player Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 48px;
    }
    .wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 860px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo img { width: 420px; height: auto; display: block; margin: 0 auto; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 10px; letter-spacing: 0.2px; }
    .cards-row { display: flex; align-items: stretch; width: 100%; flex-wrap: wrap; gap: 0; }
    .card {
      background: white; border-radius: 20px; border: 1px solid #f1f5f9;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 28px 24px 24px; display: flex; flex-direction: column; align-items: center;
      text-align: center; flex: 1; min-width: 220px;
    }
    .icon-wrap { height: 72px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .card-title { font-size: 17px; font-weight: 700; color: #0f172a; margin: 0 0 6px; letter-spacing: -0.2px; }
    .card-desc { font-size: 13px; color: #64748b; margin: 0 0 18px; line-height: 1.5; flex-grow: 1; }
    .btn {
      width: 100%; padding: 12px 16px; border: none; border-radius: 12px;
      color: white; font-size: 14px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.1px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-family: inherit;
    }
    .btn-cloud  { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-server { background: linear-gradient(135deg, #f97316, #ea580c); }
    .or-divider { display: flex; flex-direction: column; align-items: center; padding: 0 12px; flex-shrink: 0; }
    .or-line { width: 1px; flex: 1; background: #e2e8f0; }
    .or-badge {
      padding: 4px 10px; background: #f1f5f9; border-radius: 20px;
      font-size: 11px; font-weight: 700; color: #94a3b8; margin: 8px 0;
      letter-spacing: 1px; border: 1px solid #e2e8f0; white-space: nowrap;
    }
    .card-input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 13px; color: #64748b; background: #f8fafc; margin-bottom: 14px;
      outline: none; font-family: inherit; transition: border-color 0.2s;
    }
    .card-input:focus { border-color: #f97316; }
    .error-msg { color: #ef4444; font-size: 12px; margin: -10px 0 10px; display: none; width: 100%; text-align: left; }
    .footer { display: flex; align-items: center; justify-content: center; margin-top: 28px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">
      <img src="./icon.png" alt="Digipal Player" />
      <p>Connect to your signage server</p>
    </div>

    <div class="cards-row">

      <!-- Cloud Card -->
      <div class="card">
        <div class="icon-wrap">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <path d="M56 34c0-11-8.95-20-20-20a19.96 19.96 0 0 0-17.4 10.2A13 13 0 1 0 18 50h36a11 11 0 0 0 2-21.7V34z" fill="#3B82F6" opacity="0.18"/>
            <path d="M54 32c0-10.5-8.5-19-19-19a18.96 18.96 0 0 0-16.5 9.7A11.5 11.5 0 1 0 20 48h32a10 10 0 0 0 2-19.75V32z" fill="#3B82F6"/>
            <path d="M48 29c0-7-5.7-12.7-12.7-12.7a12.67 12.67 0 0 0-11 6.5A7.7 7.7 0 1 0 26 41h20a6.7 6.7 0 0 0 2-13.2V29z" fill="#93C5FD" opacity="0.3"/>
            <line x1="32" y1="50" x2="32" y2="30" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <polyline points="22,38 32,27 42,38" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h3 class="card-title">Use Cloud Server</h3>
        <p class="card-desc">Managed hosting — always up to date</p>
        <button class="btn btn-cloud" id="cloud-btn">Connect to Cloud Server ›</button>
      </div>

      <div class="or-divider"><div class="or-line"></div><span class="or-badge">OR</span><div class="or-line"></div></div>

      <!-- Server Address Card -->
      <div class="card">
        <div class="icon-wrap">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="6" y="11" width="36" height="13" rx="3.5" fill="#F97316" opacity="0.12"/>
            <rect x="6" y="11" width="36" height="13" rx="3.5" stroke="#F97316" stroke-width="2.2"/>
            <circle cx="14" cy="17.5" r="2.8" fill="#F97316"/>
            <rect x="20" y="14.5" width="13" height="5" rx="1.8" fill="#F97316" opacity="0.4"/>
            <rect x="6" y="28" width="36" height="13" rx="3.5" fill="#F97316" opacity="0.07"/>
            <rect x="6" y="28" width="36" height="13" rx="3.5" stroke="#F97316" stroke-width="2.2"/>
            <circle cx="14" cy="34.5" r="2.8" fill="#F97316"/>
            <rect x="20" y="31.5" width="13" height="5" rx="1.8" fill="#F97316" opacity="0.4"/>
            <path d="M42 24.5 Q46 24.5 46 28" stroke="#F97316" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <rect x="46" y="23" width="12" height="9" rx="2.5" fill="#F97316"/>
            <line x1="49.5" y1="23" x2="49.5" y2="18" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="54.5" y1="23" x2="54.5" y2="18" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="card-title">Enter Server Address</h3>
        <input class="card-input" type="url" id="url" placeholder="e.g. http://192.168.1.100:8787" />
        <div class="error-msg" id="error">Please enter a valid URL starting with https://</div>
        <button class="btn btn-server" id="connect">Connect to Manual Server ›</button>
      </div>

    </div>

    <div class="footer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="margin-right:6px;flex-shrink:0">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="#14B8A6"/>
      </svg>
      Your connection details are private and secure. &nbsp;·&nbsp; Change any time with Ctrl + Alt + S
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const errorEl = document.getElementById('error');
    const connectBtn = document.getElementById('connect');
    const cloudBtn = document.getElementById('cloud-btn');

    function connectToUrl(url) {
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('server-url-submitted', url);
    }

    cloudBtn.addEventListener('click', function() {
      connectToUrl('https://digipal-cms.replit.app');
    });

    connectBtn.addEventListener('click', function() {
      const url = urlInput.value.trim().replace(/\/+$/, '');
      if (!url || (!url.startsWith('https://') && !url.startsWith('http://'))) {
        errorEl.style.display = 'block';
        urlInput.focus();
        return;
      }
      errorEl.style.display = 'none';
      connectToUrl(url);
    });

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') connectBtn.click();
      else errorEl.style.display = 'none';
    });
  </script>
</body>
</html>

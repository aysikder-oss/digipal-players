name: Build Vega Player (Fire TV)

  on:
    push:
      paths:
        - 'vega/**'
      branches:
        - main
      tags:
        - 'vega-v*'
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-22.04
      timeout-minutes: 60
      defaults:
        run:
          working-directory: vega
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install system dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y lz4 curl
            sudo add-apt-repository -y ppa:deadsnakes/ppa
            sudo apt-get update
            sudo apt-get install -y libpython3.8-dev
          working-directory: .
        - name: Install Watchman
          run: sudo apt-get install -y watchman || true
          working-directory: .
        - name: Install Vega SDK
          run: ${{ secrets.VEGA_SDK_INSTALL_CMD }}
          env:
            CI: true
          working-directory: .
        - name: Build Vega Player
          run: |
            KEPLER_FILE=$(find ~ /usr/local -name "kepler" -type f 2>/dev/null | head -1)
            if [ -n "$KEPLER_FILE" ]; then
              export PATH="$(dirname $KEPLER_FILE):$PATH"
            else
              SDK_VER=$(ls ~/kepler/sdk/ 2>/dev/null | head -1)
              [ -n "$SDK_VER" ] && export PATH="$HOME/kepler/sdk/$SDK_VER/bin:$PATH"
            fi
            npm install
            npm install @react-native-async-storage/async-storage react-native-webview
            kepler build -b Release -t aarch64 || true
            mkdir -p $GITHUB_WORKSPACE/output
            find . -name "*.vpkg" -exec cp {} $GITHUB_WORKSPACE/output/ \;
        - uses: actions/upload-artifact@v4
          with:
            name: DigipalVegaPlayer-${{ github.run_number }}
            path: output/*.vpkg
            if-no-files-found: warn
            retention-days: 30
  
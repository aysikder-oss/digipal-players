name: Build Windows Player (Smart Triggers)

  on:
    push:
      paths:
        - 'windows-smart-triggers/**'
      branches:
        - main
      tags:
        - 'windows-st-v*'
    workflow_dispatch:

  permissions:
    contents: write

  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  jobs:
    build:
      runs-on: windows-latest
      defaults:
        run:
          working-directory: windows-smart-triggers
      steps:
        - uses: actions/checkout@v5
        - uses: actions/setup-node@v5
          with:
            node-version: '20'
        - uses: actions/setup-python@v6
          with:
            python-version: '3.11'
        - run: npm install
        - run: npm run build
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - uses: actions/upload-artifact@v5
          with:
            name: DigipalPlayer-SmartTriggers-Installer
            path: windows-smart-triggers/dist/*.exe
            retention-days: 90
            if-no-files-found: warn

    release:
      needs: build
      if: startsWith(github.ref, 'refs/tags/windows-st-v')
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/download-artifact@v4
          with:
            path: artifacts
        - uses: softprops/action-gh-release@v2
          with:
            files: artifacts/**/*.exe
            generate_release_notes: true
  
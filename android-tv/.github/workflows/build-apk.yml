name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/DigipalPlayer-v3.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: DigipalPlayer-v3
          path: release/DigipalPlayer-v3.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: Digipal Player v3.0.${{ github.run_number }}
          files: release/DigipalPlayer-v3.apk
          make_latest: true
          body: |
            Digipal Player v3.0.${{ github.run_number }}
            
            Includes native local media storage for offline playback.
            
            Built from commit ${{ github.sha }}

# NOTE: This workflow is designed for the standalone aysikder-oss/digipal-linux-player repo.
# The repo root contains the Electron app files directly (not linux-player/).
name: Build Linux Player

on:
  push:
    paths:
      - '**'
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build x64 packages
        run: |
          npx electron-builder --linux deb AppImage rpm --x64 --publish never

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-deb-x64
          path: release/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-appimage-x64
          path: release/*.AppImage

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-rpm-x64
          path: release/*.rpm

  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build arm64 packages
        run: |
          npx electron-builder --linux deb --arm64 --publish never

      - name: Upload DEB arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-deb-arm64
          path: release/*.deb

      - name: Upload AppImage arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-appimage-arm64
          path: release/*.AppImage

      - name: Upload RPM arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-linux-player-rpm-arm64
          path: release/*.rpm

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-x64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

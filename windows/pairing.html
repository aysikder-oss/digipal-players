<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digipal Player — Hub Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 48px;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    .logo { margin-bottom: 32px; }
    .logo img { width: 300px; height: auto; display: block; margin: 0 auto; }
    .icon-wrap {
      width: 96px; height: 96px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .headline {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .hub-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0fdfa;
      border: 1.5px solid #99f6e4;
      border-radius: 999px;
      padding: 6px 16px;
      margin-bottom: 8px;
    }
    .hub-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #14B8A6;
      flex-shrink: 0;
    }
    .hub-name {
      font-size: 15px;
      font-weight: 600;
      color: #0d9488;
    }
    .hub-url {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 32px;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .btn-connect {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #14B8A6, #0d9488);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.1px;
      box-shadow: 0 4px 16px rgba(20,184,166,0.3);
      font-family: inherit;
      margin-bottom: 16px;
      transition: opacity 0.15s;
    }
    .btn-connect:hover { opacity: 0.92; }
    .skip-link {
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 4px;
    }
    .skip-link:hover { color: #64748b; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">
      <img src="./digipal_logo.png" alt="Digipal" />
    </div>

    <div class="icon-wrap">
      <svg width="96" height="96" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="28" stroke="#14B8A6" stroke-width="2" fill="none" opacity="0.2"/>
        <circle cx="32" cy="32" r="19" stroke="#14B8A6" stroke-width="2.5" fill="none" opacity="0.45"/>
        <circle cx="32" cy="32" r="11" stroke="#14B8A6" stroke-width="3" fill="none" opacity="0.75"/>
        <circle cx="32" cy="32" r="5" fill="#14B8A6"/>
      </svg>
    </div>

    <h1 class="headline">Digipal Hub Found</h1>

    <div class="hub-badge">
      <div class="hub-dot"></div>
      <span class="hub-name" id="hub-name">Digipal Hub</span>
    </div>
    <p class="hub-url" id="hub-url">—</p>

    <button class="btn-connect" id="connect-btn">Connect to this Hub ›</button>
    <button class="skip-link" id="skip-btn">Skip — use cloud server instead</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const DEFAULT_CLOUD = 'https://digipalsignage.com';

    let serverUrl = '';

    ipcRenderer.on('pairing:setServer', (_event, info) => {
      serverUrl = info.url;
      document.getElementById('hub-name').textContent = info.name || 'Digipal Hub';
      document.getElementById('hub-url').textContent = info.url;
    });

    document.getElementById('connect-btn').addEventListener('click', () => {
      if (serverUrl) ipcRenderer.send('server-url-submitted', serverUrl);
    });

    document.getElementById('skip-btn').addEventListener('click', () => {
      ipcRenderer.send('server-url-submitted', DEFAULT_CLOUD);
    });
  </script>
</body>
</html>

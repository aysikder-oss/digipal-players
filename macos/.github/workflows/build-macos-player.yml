# NOTE: This workflow is designed for the standalone aysikder-oss/digipal-macos-player repo.
# The repo root contains DigipalPlayer/ directly (not macos-player/DigipalPlayer/).
name: Build macOS Player

on:
  push:
    paths:
      - '**'
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build app (Release)
        working-directory: DigipalPlayer
        run: |
          xcodebuild -project DigipalPlayer.xcodeproj \
            -scheme DigipalPlayer \
            -configuration Release \
            -archivePath build/DigipalPlayer.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app bundle
        working-directory: DigipalPlayer
        run: |
          mkdir -p build/app
          cp -R "build/DigipalPlayer.xcarchive/Products/Applications/Digipal Player.app" build/app/

      - name: Create DMG
        working-directory: DigipalPlayer
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Digipal Player" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Digipal Player.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "build/DigipalPlayer-1.0.0.dmg" \
            "build/app/" || true
          
          if [ ! -f "build/DigipalPlayer-1.0.0.dmg" ]; then
            hdiutil create -volname "Digipal Player" \
              -srcfolder "build/app" \
              -ov -format UDZO \
              "build/DigipalPlayer-1.0.0.dmg"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-macos-player-dmg
          path: DigipalPlayer/build/DigipalPlayer-1.0.0.dmg

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipal-macos-player-app
          path: DigipalPlayer/build/app/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
